{{ define "main" }}
<article>
  <header class="article-header">
    <h1>{{ .Title }}</h1>
  </header>
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="post-date">{{ .Date | time.Format ":date_medium" }}</span>
    </li>
    {{ end }}
  </ul>
</article>
{{ end }}
